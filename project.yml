name: SmartSSH
options:
  bundleIdPrefix: com.smartssh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: SmartSSH
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES

targets:
  SmartSSH:
    type: application
    platform: iOS
    sources:
      - path: SmartSSH
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: SmartSSH/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.smartssh.app
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: "SmartSSH"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    entitlements:
      path: SmartSSH/SmartSSH.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.smartssh.app
        com.apple.developer.icloud-services:
          - CloudDocuments

  SmartSSHUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SmartSSHUITests
    dependencies:
      - target: SmartSSH
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartssh.app.uitests
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: SmartSSHUITests
